name: Compile LaTeX and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Deploy PDF to pdf branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pdf-tmp
          git reset
          git add main.pdf
          git commit -m "Update PDF"
          git push origin pdf-tmp:pdf --force

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Delete failed workflow runs
        run: |
          gh run list --repo $REPO --status failure --json databaseId -q '.[].databaseId' | \
          xargs -I {} gh run delete --repo $REPO {}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
